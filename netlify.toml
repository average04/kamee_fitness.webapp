# Netlify build config. The Next.js app lives in a nested subfolder, so `base`
# points Netlify there; the official Next.js runtime plugin handles SSR, the
# /api/waitlist route handler, and image optimization automatically.
[build]
  base = "kamee-fitness.webapp"
  command = "npm run build"

[build.environment]
  # Next.js 16 requires Node 20+.
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
